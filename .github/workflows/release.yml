name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v0.1.0). Leave empty for draft release.'
        required: false
        type: string

# Ensure only one release workflow runs at a time per ref
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # Required for creating releases and uploading assets

jobs:
  # ── Run tests first (fast, single platform) ──────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @bluslate/core run build

      - name: Run tests
        run: pnpm run test

  # ── Build installers per platform ────────────────────────────────────
  build:
    name: Build (${{ matrix.display_name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            display_name: macOS arm64
            electron_args: --mac --arm64
          - os: macos-13-large
            display_name: macOS x64
            electron_args: --mac --x64
          - os: windows-latest
            display_name: Windows x64
            electron_args: --win --x64
          - os: ubuntu-latest
            display_name: Linux x64
            electron_args: --linux --x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @bluslate/core
        run: pnpm --filter @bluslate/core run build

      - name: Build @bluslate/gui
        run: pnpm --filter @bluslate/gui run build

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO: Code signing environment variables
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        working-directory: packages/gui
        run: npx electron-builder --config electron-builder.yml --publish never ${{ matrix.electron_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            packages/gui/release/*.dmg
            packages/gui/release/*.zip
            packages/gui/release/*.exe
            packages/gui/release/*.AppImage
            packages/gui/release/*.deb
            packages/gui/release/*.yml
            packages/gui/release/*.yaml
            !packages/gui/release/*-unpacked
            !packages/gui/release/mac-*
          if-no-files-found: error
          retention-days: 7

  # ── Create GitHub Release and attach all artifacts ───────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "is_draft=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "is_draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=draft-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
            echo "is_draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: BluSlate ${{ steps.tag.outputs.tag_name }}
          draft: ${{ steps.tag.outputs.is_draft }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
